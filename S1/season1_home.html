<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPL Season 01 | Cover Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0e14;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Clean cover page look */
        }

        .teko {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(225, 29, 72, 0.2) 0%, rgba(10, 14, 20, 1) 80%);
            height: 100vh;
        }

        .text-glow {
            text-shadow: 0 0 30px rgba(225, 29, 72, 0.6);
        }

        .skew-label {
            transform: skewX(-12deg);
        }

        /* Animated background pulse */
        .pulse-bg {
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body class="antialiased">

    <!-- Hamburger Menu -->
    <button id="menu-btn" class="fixed top-6 right-6 z-50 text-white hover:text-rose-500 transition-colors focus:outline-none bg-black/50 p-2 rounded-full backdrop-blur-md border border-white/10 shadow-[0_0_15px_rgba(225,29,72,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Dropdown Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-slate-900/95 z-[60] hidden flex-col items-center justify-center backdrop-blur-xl">
        <button id="close-btn" class="absolute top-6 right-6 text-white hover:text-rose-500 transition-colors focus:outline-none bg-black/50 p-2 rounded-full border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <nav class="flex flex-col gap-8 text-center teko text-4xl mt-12">
            <a href="https://debadattagadanayak.github.io/TPL/index.html" class="hover:text-rose-500 transition-colors">TPL Home</a>
            <a href="https://debadattagadanayak.github.io/TPL/S1/season1_home.html" class="text-rose-500">Season 01 (Current)</a>
            <a href="https://debadattagadanayak.github.io/TPL/S2/season2_home.html" class="hover:text-rose-500 transition-colors">Season 02</a>
            <a href="https://debadattagadanayak.github.io/TPL/S2/rulebook.html" class="hover:text-rose-500 transition-colors">Rule Book</a>
        </nav>
        <div class="mt-16 h-[1px] w-24 bg-rose-600/50"></div>
        <p class="mt-6 teko text-xl text-slate-500 tracking-widest italic">#RiseToGreatness</p>
    </div>

    <div class="relative flex flex-col items-center justify-center hero-gradient px-4">

        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-rose-600/20 rounded-full blur-[120px] pulse-bg"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-600/10 rounded-full blur-[120px] pulse-bg"></div>

        <div class="z-10 w-full max-w-5xl text-center">
            <p class="teko text-xl md:text-2xl text-rose-500 font-bold tracking-[0.4em] mb-6 opacity-90">
                Sri Laxmi Narasimha PG Presents
            </p>

            <h1 class="teko text-8xl md:text-[12rem] font-bold leading-[0.8] mb-4 tracking-tighter italic text-glow">
                TURFERS<br>
                <span class="text-rose-600">PREMIER LEAGUE</span>
            </h1>

            <div class="relative inline-block mb-16">
                <div
                    class="bg-rose-600 text-white py-2 px-12 teko text-4xl md:text-6xl skew-label font-bold shadow-[0_10px_40px_rgba(225,29,72,0.4)]">
                    SEASON 01
                </div>
            </div>

            <div
                class="grid grid-cols-1 md:grid-cols-3 gap-0 max-w-4xl mx-auto glass-card rounded-xl overflow-hidden border-b-4 border-rose-600">
                <div class="py-6 px-4 border-r border-white/10">
                    <p class="teko text-rose-500 text-lg tracking-widest">Date</p>
                    <p class="teko text-3xl font-bold uppercase">19th July 2025</p>
                </div>
                <div class="py-6 px-4 border-r border-white/10 bg-white/5">
                    <p class="teko text-rose-500 text-lg tracking-widest">Kick Off</p>
                    <p class="teko text-3xl font-bold uppercase">7:00 PM Onwards</p>
                </div>
                <div class="py-6 px-4">
                    <p class="teko text-rose-500 text-lg tracking-widest">Arena</p>
                    <p class="teko text-3xl font-bold uppercase">Forma Sports Avenue</p>
                </div>
            </div>

            <p class="mt-12 text-slate-400 uppercase tracking-[0.5em] text-sm font-light">
                Chasing Glory Under The Lights
            </p>
        </div>

        <div class="absolute bottom-8 w-full text-center">
            <div class="h-[1px] w-24 bg-rose-600/50 mx-auto mb-4"></div>
            <p class="teko text-xl text-slate-600 tracking-widest italic">#TPL2025 #RiseToGreatness</p>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('hidden');
            mobileMenu.classList.add('flex');
            document.body.style.overflow = 'hidden';
        });

        closeBtn.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            mobileMenu.classList.remove('flex');
            document.body.style.overflow = '';
        });
    </script>
</body>

</html>
