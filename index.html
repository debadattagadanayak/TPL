<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turfers Premier League | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0e14;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .teko {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .glass-card.theme-rose {
            border-bottom: 4px solid #e11d48;
        }

        .glass-card.theme-rose:hover {
            border-color: rgba(225, 29, 72, 0.5);
            border-bottom-color: #e11d48;
        }

        .glass-card.theme-green {
            border-bottom: 4px solid #22c55e;
        }

        .glass-card.theme-green:hover {
            border-color: rgba(34, 197, 94, 0.5);
            border-bottom-color: #22c55e;
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 30%, rgba(225, 29, 72, 0.2) 0%, rgba(10, 14, 20, 1) 70%);
            min-height: 100vh;
        }

        .text-glow {
            text-shadow: 0 0 30px rgba(225, 29, 72, 0.6);
        }

        /* Animated background pulse */
        .pulse-bg {
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body class="antialiased">

    <!-- Navigation Sidebar -->
    <div id="side-menu" class="fixed inset-y-0 left-0 w-80 bg-slate-900/98 z-[60] -translate-x-full transition-transform duration-300 ease-in-out backdrop-blur-2xl border-r border-white/10 overflow-y-auto">
        <div class="p-8">
            <div class="flex items-center justify-end mb-16">
                <button id="close-side-btn" class="text-white hover:text-rose-500 transition-all transform hover:rotate-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <nav class="flex flex-col gap-6 teko text-3xl">
                <a href="https://debadattagadanayak.github.io/TPL/index.html" class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/5 transition-colors group">
                    <span class="group-hover:translate-x-2 transition-transform text-rose-500">TPL Home</span>
                </a>

                <!-- Season 01 Dropdown -->
                <div class="flex flex-col">
                    <button class="dropdown-toggle flex items-center justify-between p-4 rounded-xl hover:bg-white/5 transition-colors w-full text-left group">
                        <span class="group-hover:translate-x-2 transition-transform font-bold">Season 01</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform duration-300 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div class="dropdown-content hidden flex-col pl-8 mt-2 gap-4 border-l-2 border-white/5 ml-4">
                        <a href="https://debadattagadanayak.github.io/TPL/S1/season1_home.html" class="text-slate-400 hover:text-rose-500 text-2xl transition-colors">Home</a>
                    </div>
                </div>

                <!-- Season 02 Dropdown -->
                <div class="flex flex-col border-t border-white/5 pt-6 mt-2">
                    <button class="dropdown-toggle flex items-center justify-between p-4 rounded-xl hover:bg-white/5 transition-colors w-full text-left group">
                        <span class="group-hover:translate-x-2 transition-transform font-bold">Season 02</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform duration-300 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div class="dropdown-content hidden flex-col pl-8 mt-2 gap-4 border-l-2 border-white/5 ml-4">
                        <a href="https://debadattagadanayak.github.io/TPL/S2/season2_home.html" class="text-slate-400 hover:text-rose-500 text-2xl transition-colors">Home</a>
                        <a href="https://debadattagadanayak.github.io/TPL/S2/rulebook.html" class="text-slate-400 hover:text-rose-500 text-2xl transition-colors">Rule Book</a>
                        <a href="https://debadattagadanayak.github.io/TPL/S2/teams.html" class="text-slate-400 hover:text-rose-500 text-2xl transition-colors">Teams</a>
                    </div>
                </div>
            </nav>

            <div class="mt-32 h-[1px] w-full bg-gradient-to-r from-transparent via-rose-600/30 to-transparent"></div>
            <p class="mt-8 teko text-xl text-slate-500 tracking-widest italic text-center">#RiseToGreatness</p>
        </div>
    </div>

    <!-- Backdrop Overlay -->
    <div id="side-backdrop" class="fixed inset-0 bg-black/60 z-[55] hidden backdrop-blur-sm transition-opacity duration-300"></div>

    <!-- Hamburger Button (Moved to Left) -->
    <button id="open-side-btn" class="fixed top-6 left-6 z-50 text-white hover:text-rose-500 transition-all focus:outline-none bg-black/50 p-2.5 rounded-full backdrop-blur-md border border-white/10 shadow-[0_0_20px_rgba(225,29,72,0.2)] hover:scale-110 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <div class="relative flex flex-col items-center justify-center hero-gradient px-4 py-16 min-h-screen">

        <!-- Background elements -->
        <div
            class="absolute top-1/4 left-1/4 w-64 h-64 bg-rose-600/20 rounded-full blur-[120px] pulse-bg pointer-events-none">
        </div>
        <div
            class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-600/10 rounded-full blur-[120px] pulse-bg pointer-events-none">
        </div>

        <div class="z-10 w-full max-w-5xl text-center flex-1 flex flex-col justify-center">

            <h1
                class="teko text-5xl sm:text-7xl md:text-[10rem] font-bold leading-[0.85] mb-6 tracking-tighter italic text-glow mt-8">
                TURFERS<br>
                <span class="text-rose-600">PREMIER LEAGUE</span>
            </h1>

            <p class="teko text-2xl md:text-3xl text-slate-300 tracking-[0.3em] mb-16 opacity-90 mx-auto max-w-2xl">
                Chasing Glory Under The Lights
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto w-full">

                <!-- Season 01 Card -->
                <a href="https://debadattagadanayak.github.io/TPL/S1/season1_home.html"
                    class="block glass-card theme-rose rounded-xl overflow-hidden group text-left relative">
                    <div
                        class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity pointer-events-none">
                        <span class="teko text-8xl font-bold">01</span>
                    </div>
                    <div class="p-8 relative z-10">
                        <div
                            class="inline-block bg-rose-600/20 text-rose-500 font-bold px-3 py-1 rounded text-xs tracking-widest mb-4">
                            COMPLETED</div>
                        <h2 class="teko text-4xl md:text-5xl font-bold mb-2">Season 01</h2>
                        <p class="text-slate-400 text-sm mb-6 font-light">19th July 2025 • Forma Sports Avenue</p>
                        <div
                            class="flex items-center text-rose-500 font-bold teko text-xl group-hover:text-rose-400 transition-colors">
                            Explore Season
                            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </div>
                    </div>
                </a>

                <!-- Season 02 Card -->
                <a href="https://debadattagadanayak.github.io/TPL/S2/season2_home.html"
                    class="block glass-card theme-green rounded-xl overflow-hidden group text-left relative">
                    <div
                        class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity pointer-events-none">
                        <span class="teko text-8xl font-bold">02</span>
                    </div>
                    <div class="p-8 relative z-10">
                        <div
                            class="inline-block bg-green-500/20 text-green-400 font-bold px-3 py-1 rounded text-xs tracking-widest mb-4">
                            UPCOMING</div>
                        <h2 class="teko text-4xl md:text-5xl font-bold mb-2">Season 02</h2>
                        <p class="text-slate-400 text-sm mb-6 font-light">11th April 2026 • Forma Sports Avenue</p>
                        <div
                            class="flex items-center text-green-500 font-bold teko text-xl group-hover:text-green-400 transition-colors">
                            Explore Season
                            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </div>
                    </div>
                </a>

            </div>

        </div>

        <div class="w-full text-center mt-16 pt-8">
            <div class="h-[1px] w-24 bg-rose-600/50 mx-auto mb-4"></div>
            <p class="teko text-xl text-slate-600 tracking-widest italic">#TPL #RiseToGreatness</p>
        </div>
    </div>

    <script>
        const openSideBtn = document.getElementById('open-side-btn');
        const closeSideBtn = document.getElementById('close-side-btn');
        const sideMenu = document.getElementById('side-menu');
        const sideBackdrop = document.getElementById('side-backdrop');
        const dropdownToggles = document.querySelectorAll('.dropdown-toggle');

        // Sidebar Open/Close
        function toggleSidebar(open) {
            if (open) {
                sideMenu.classList.remove('-translate-x-full');
                sideBackdrop.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                sideMenu.classList.add('-translate-x-full');
                sideBackdrop.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        openSideBtn.addEventListener('click', () => toggleSidebar(true));
        closeSideBtn.addEventListener('click', () => toggleSidebar(false));
        sideBackdrop.addEventListener('click', () => toggleSidebar(false));

        // Dropdown Toggle
        dropdownToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const content = toggle.nextElementSibling;
                const icon = toggle.querySelector('svg');
                
                content.classList.toggle('hidden');
                content.classList.toggle('flex');
                icon.classList.toggle('rotate-180');
            });
        });
    </script>
</body>

</html>
