<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPL Season 02 | Prize Ceremony</title>
    <meta name="description" content="Relive the glory of the Turfers Premier League Season 2 Prize Ceremony. Photo gallery from the grand finale.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0e14;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .teko {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        .text-glow {
            text-shadow: 0 0 30px rgba(225, 29, 72, 0.6);
        }

        .pulse-bg {
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50%       { opacity: 0.7; transform: scale(1.05); }
        }

        /* ── Gallery Grid ── */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #0d1117;
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .gallery-item:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(225, 29, 72, 0.5);
            box-shadow: 0 20px 60px rgba(225, 29, 72, 0.2), 0 0 0 1px rgba(225, 29, 72, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.55s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10, 14, 20, 0.85) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1.25rem;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay-icon {
            background: rgba(225, 29, 72, 0.85);
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(12px);
            transition: transform 0.35s ease;
            backdrop-filter: blur(4px);
        }

        .gallery-item:hover .overlay-icon {
            transform: translateY(0);
        }

        /* ── Lightbox ── */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(5, 7, 12, 0.96);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(12px);
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 0.75rem;
            object-fit: contain;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(225, 29, 72, 0.15);
            transform: scale(0.92);
            transition: transform 0.3s ease;
        }

        #lightbox.active img {
            transform: scale(1);
        }

        #lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: white;
        }

        #lightbox-close:hover {
            background: rgba(225, 29, 72, 0.5);
            transform: rotate(90deg);
        }

        #lightbox-prev, #lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: white;
        }

        #lightbox-prev { left: 1.5rem; }
        #lightbox-next { right: 1.5rem; }

        #lightbox-prev:hover { background: rgba(225, 29, 72, 0.4); transform: translateY(-50%) scale(1.1); }
        #lightbox-next:hover { background: rgba(225, 29, 72, 0.4); transform: translateY(-50%) scale(1.1); }

        #lightbox-counter {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            padding: 0.4rem 1.2rem;
            font-family: 'Teko', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* ── Dot indicators at bottom of lightbox ── */
        #lightbox-dots {
            position: absolute;
            bottom: 3.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
        }

        .lb-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
        }

        .lb-dot.active {
            background: #e11d48;
            transform: scale(1.35);
        }

        /* ── Hero section top gradient ── */
        .hero-bar {
            background: linear-gradient(180deg, rgba(225, 29, 72, 0.12) 0%, transparent 100%);
        }

        /* ── Featured banner (full-width champion card) ── */
        .featured-banner img {
            object-fit: cover;
            object-position: top center;
        }

        /* Persistent bottom-left text overlay on champion card */
        .champion-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(5, 7, 12, 0.88) 0%, rgba(5, 7, 12, 0.2) 45%, transparent 70%);
            display: flex;
            align-items: flex-end;
            padding: 2rem 2.5rem;
            pointer-events: none;
        }

        .champion-text-block {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .champion-label {
            font-family: 'Teko', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(251, 191, 36, 0.95);
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .champion-team {
            font-family: 'Teko', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0;
            line-height: 0.85;
            text-shadow: 0 0 60px rgba(225, 29, 72, 0.7), 0 4px 20px rgba(0,0,0,0.8);
            -webkit-text-stroke: 1px rgba(225, 29, 72, 0.4);
        }

        /* ── Photo number badge ── */
        .photo-badge {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            background: rgba(225, 29, 72, 0.8);
            border-radius: 0.375rem;
            padding: 0.1rem 0.6rem;
            font-family: 'Teko', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: white;
            backdrop-filter: blur(4px);
        }
    </style>
</head>

    </div>

    <!-- ── LIGHTBOX ── -->
    <div id="lightbox">
        <button id="lightbox-close">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <button id="lightbox-prev">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <img id="lightbox-img" src="" alt="Prize Ceremony Photo">

        <button id="lightbox-next">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
        </button>

        <div id="lightbox-dots"></div>
        <div id="lightbox-counter"></div>
    </div>

    <script>
        // ── Sidebar ──────────────────────────────────────────────
        const openSideBtn  = document.getElementById('open-side-btn');
        const closeSideBtn = document.getElementById('close-side-btn');
        const sideMenu     = document.getElementById('side-menu');
        const sideBackdrop = document.getElementById('side-backdrop');

        function toggleSidebar(open) {
            if (open) {
                sideMenu.classList.remove('-translate-x-full');
                sideBackdrop.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                sideMenu.classList.add('-translate-x-full');
                sideBackdrop.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        openSideBtn.addEventListener('click',  () => toggleSidebar(true));
        closeSideBtn.addEventListener('click', () => toggleSidebar(false));
        sideBackdrop.addEventListener('click', () => toggleSidebar(false));

        document.querySelectorAll('.dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const content = toggle.nextElementSibling;
                const icon    = toggle.querySelector('svg');
                content.classList.toggle('hidden');
                content.classList.toggle('flex');
                icon.classList.toggle('rotate-180');
            });
        });

        // ── Lightbox ─────────────────────────────────────────────
        const photos = [
            './Assets/Photos/Prize Ceremony/Champion.png',
            './Assets/Photos/Prize Ceremony/2.png',
            './Assets/Photos/Prize Ceremony/3.png',
            './Assets/Photos/Prize Ceremony/4.png',
            './Assets/Photos/Prize Ceremony/5.png',
            './Assets/Photos/Prize Ceremony/6.png',
        ];

        let currentIndex = 0;

        const lightbox      = document.getElementById('lightbox');
        const lbImg         = document.getElementById('lightbox-img');
        const lbCounter     = document.getElementById('lightbox-counter');
        const lbDots        = document.getElementById('lightbox-dots');
        const lbClose       = document.getElementById('lightbox-close');
        const lbPrev        = document.getElementById('lightbox-prev');
        const lbNext        = document.getElementById('lightbox-next');

        // Build dot indicators
        photos.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => showPhoto(i));
            lbDots.appendChild(dot);
        });

        function showPhoto(index) {
            currentIndex = (index + photos.length) % photos.length;
            lbImg.src = photos[currentIndex];
            lbCounter.textContent = `${currentIndex + 1} / ${photos.length}`;
            document.querySelectorAll('.lb-dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentIndex);
            });
        }

        function openLightbox(index) {
            showPhoto(index);
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        lbClose.addEventListener('click', closeLightbox);
        lbPrev.addEventListener('click',  () => showPhoto(currentIndex - 1));
        lbNext.addEventListener('click',  () => showPhoto(currentIndex + 1));

        // Click outside image to close
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft')  showPhoto(currentIndex - 1);
            if (e.key === 'ArrowRight') showPhoto(currentIndex + 1);
            if (e.key === 'Escape')     closeLightbox();
        });

        // Touch/swipe support
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        lightbox.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? showPhoto(currentIndex + 1) : showPhoto(currentIndex - 1);
            }
        });
    </script>
</body>

</html>
