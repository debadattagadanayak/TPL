<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPL Season 02 | Gallery</title>
    <meta name="description" content="Turfers Premier League Season 2 Gallery — relive every match-day and prize ceremony moment in photos.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0e14;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .teko {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        .text-glow {
            text-shadow: 0 0 30px rgba(225, 29, 72, 0.6);
        }

        .pulse-bg {
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50%       { opacity: 0.7; transform: scale(1.05); }
        }

        /* ── Hero bar ── */
        .hero-bar {
            background: linear-gradient(180deg, rgba(225, 29, 72, 0.12) 0%, transparent 100%);
        }

        /* ─────────────────────────────────────────────
           MASONRY GALLERY
        ───────────────────────────────────────────── */
        .masonry-grid {
            columns: 1;
            column-gap: 1rem;
        }
        @media (min-width: 480px)  { .masonry-grid { columns: 2; } }
        @media (min-width: 900px)  { .masonry-grid { columns: 3; } }
        @media (min-width: 1280px) { .masonry-grid { columns: 4; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1rem;
            position: relative;
            border-radius: 0.875rem;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: #0d1117;
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .masonry-item:hover {
            transform: translateY(-5px) scale(1.015);
            border-color: rgba(225, 29, 72, 0.5);
            box-shadow: 0 20px 60px rgba(225, 29, 72, 0.18), 0 0 0 1px rgba(225, 29, 72, 0.12);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.55s ease;
        }

        .masonry-item:hover img {
            transform: scale(1.04);
        }

        /* Hover overlay */
        .masonry-item .m-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,14,20,0.8) 0%, transparent 55%);
            opacity: 0;
            transition: opacity 0.35s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1.1rem;
        }

        .masonry-item:hover .m-overlay {
            opacity: 1;
        }

        .m-zoom-btn {
            background: rgba(225, 29, 72, 0.85);
            border-radius: 50%;
            width: 2.75rem;
            height: 2.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(10px);
            transition: transform 0.35s ease;
            backdrop-filter: blur(4px);
        }

        .masonry-item:hover .m-zoom-btn {
            transform: translateY(0);
        }

        /* Photo number badge */
        .m-badge {
            position: absolute;
            top: 0.6rem;
            left: 0.6rem;
            background: rgba(225, 29, 72, 0.8);
            border-radius: 0.35rem;
            padding: 0.05rem 0.55rem;
            font-family: 'Teko', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: white;
            backdrop-filter: blur(4px);
            z-index: 2;
        }

        /* ── Strip of photo count ── */
        .strip {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 9999px;
            padding: 0.55rem 1.75rem;
        }

        /* ─────────────────────────────────────────────
           LIGHTBOX
        ───────────────────────────────────────────── */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(5, 7, 12, 0.97);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(14px);
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 0.75rem;
            object-fit: contain;
            box-shadow: 0 30px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(225,29,72,0.12);
            transform: scale(0.92);
            transition: transform 0.3s ease;
        }

        #lightbox.active img {
            transform: scale(1);
        }

        #lb-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: white;
        }
        #lb-close:hover { background: rgba(225,29,72,0.5); transform: rotate(90deg); }

        #lb-prev, #lb-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: white;
        }
        #lb-prev { left: 1.25rem; }
        #lb-next { right: 1.25rem; }
        #lb-prev:hover { background: rgba(225,29,72,0.4); transform: translateY(-50%) scale(1.1); }
        #lb-next:hover { background: rgba(225,29,72,0.4); transform: translateY(-50%) scale(1.1); }

        #lb-counter {
            position: absolute;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 9999px;
            padding: 0.35rem 1.1rem;
            font-family: 'Teko', sans-serif;
            font-size: 1.05rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.55);
        }

        /* Dot strip */
        #lb-dots {
            position: absolute;
            bottom: 3.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 80vw;
        }

        .lb-dot {
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .lb-dot.active {
            background: #e11d48;
            transform: scale(1.4);
        }
    </style>
</head>

    <!-- ── LIGHTBOX ── -->
    <div id="lightbox">
        <button id="lb-close">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
        <button id="lb-prev">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <img id="lb-img" src="" alt="Match Day Photo">
        <button id="lb-next">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </button>
        <div id="lb-dots"></div>
        <div id="lb-counter"></div>
    </div>

    <script>
        // ── Sidebar ──────────────────────────────────────────────
        const openSideBtn  = document.getElementById('open-side-btn');
        const closeSideBtn = document.getElementById('close-side-btn');
        const sideMenu     = document.getElementById('side-menu');
        const sideBackdrop = document.getElementById('side-backdrop');

        function toggleSidebar(open) {
            if (open) {
                sideMenu.classList.remove('-translate-x-full');
                sideBackdrop.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                sideMenu.classList.add('-translate-x-full');
                sideBackdrop.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        openSideBtn.addEventListener('click',  () => toggleSidebar(true));
        closeSideBtn.addEventListener('click', () => toggleSidebar(false));
        sideBackdrop.addEventListener('click', () => toggleSidebar(false));

        document.querySelectorAll('.dropdown-toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const content = toggle.nextElementSibling;
                const icon    = toggle.querySelector('svg');
                content.classList.toggle('hidden');
                content.classList.toggle('flex');
                icon.classList.toggle('rotate-180');
            });
        });

        // ── Lightbox ─────────────────────────────────────────────
        const photos = [
            './Assets/Photos/Match Day/PXL_20260411_184847984.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185015491.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185259436.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185434025.PORTRAIT.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185448234.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185658498.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185739691.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_185931308.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190024370.PORTRAIT.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190102023.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190156571.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190248972.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190414245.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190542306.jpg',
            './Assets/Photos/Match Day/PXL_20260411_190600001.TS-000.jpg',
            './Assets/Photos/Match Day/PXL_20260411_191319204.jpg',
            './Assets/Photos/Match Day/PXL_20260411_191433126.TS-002.jpg',
            './Assets/Photos/Match Day/PXL_20260411_191739152.PORTRAIT.jpg',
        ];

        let currentIndex = 0;

        const lightbox  = document.getElementById('lightbox');
        const lbImg     = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');
        const lbDots    = document.getElementById('lb-dots');
        const lbClose   = document.getElementById('lb-close');
        const lbPrev    = document.getElementById('lb-prev');
        const lbNext    = document.getElementById('lb-next');

        // Build dots
        photos.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => showPhoto(i));
            lbDots.appendChild(dot);
        });

        function showPhoto(index) {
            currentIndex = (index + photos.length) % photos.length;
            lbImg.src = photos[currentIndex];
            lbCounter.textContent = `${currentIndex + 1} / ${photos.length}`;
            document.querySelectorAll('.lb-dot').forEach((d, i) =>
                d.classList.toggle('active', i === currentIndex));
        }

        function openLightbox(index) {
            showPhoto(index);
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        lbClose.addEventListener('click', closeLightbox);
        lbPrev.addEventListener('click',  () => showPhoto(currentIndex - 1));
        lbNext.addEventListener('click',  () => showPhoto(currentIndex + 1));
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft')  showPhoto(currentIndex - 1);
            if (e.key === 'ArrowRight') showPhoto(currentIndex + 1);
            if (e.key === 'Escape')     closeLightbox();
        });

        // Touch swipe
        let touchStartX = 0;
        lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
        lightbox.addEventListener('touchend',   e => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) diff > 0 ? showPhoto(currentIndex + 1) : showPhoto(currentIndex - 1);
        });
    </script>
